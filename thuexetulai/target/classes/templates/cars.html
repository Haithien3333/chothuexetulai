<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Danh sách xe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .card:hover{
            transform:scale(1.03);
            transition:0.3s;
        }

        .price{
            color:red;
            font-weight:bold;
        }
    </style>

</head>

<body>

<!-- HEADER -->
<div th:replace="header :: header"></div>

<div class="container mt-5">

    <h2 class="text-center mb-4">🚗 Danh sách xe</h2>

    <div class="row">

        <div class="col-md-4 mb-4" th:each="car : ${cars}">

            <div class="card shadow">

                <img th:src="${car.image != null ? car.image : 'https://via.placeholder.com/400x220'}"
                     class="card-img-top"
                     style="height:220px;object-fit:cover">

                <div class="card-body">

                    <h5 th:text="${car.name}"></h5>

                    <p>Hãng: <span th:text="${car.brand}"></span></p>

                    <p>Số chỗ: <span th:text="${car.seats}"></span></p>

                    <p>Nhiên liệu: <span th:text="${car.fuelType}"></span></p>

                    <p>Hộp số: <span th:text="${car.transmission}"></span></p>

                    <p class="price">
                        <span th:text="${#numbers.formatDecimal(car.price,0,'COMMA',0,'POINT')}"></span>
                        VND / ngày
                    </p>

                    <!-- USER -->
                    <div th:if="${session.user != null and session.user.role == 'USER'}">

                        <a th:href="@{'/booking/' + ${car.id}}"
                           class="btn btn-success w-100 mb-2">
                            🚗 Thuê xe
                        </a>

                    </div>

                    <!-- CHƯA LOGIN -->
                    <div th:if="${session.user == null}">

                        <a href="/login" class="btn btn-secondary w-100 mb-2">
                            Đăng nhập để thuê
                        </a>

                    </div>

                    <!-- XEM CHI TIẾT -->
                    <a th:href="@{'/car/' + ${car.id}}"
                       class="btn btn-primary w-100">
                        Xem chi tiết
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<footer class="bg-dark text-white text-center p-4 mt-5">
    © 2026 Thuê Xe Tự Lái
</footer>

</body>

</html>
