<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Quản lý xe (Admin)</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .card:hover{
            transform:scale(1.03);
            transition:0.3s;
        }

        .price{
            color:red;
            font-weight:bold;
        }
    </style>

</head>

<body>

<!-- HEADER -->
<div th:replace="header :: header"></div>

<div class="container mt-5">

    <h2 class="text-center mb-4">⚙️ Quản lý xe (ADMIN)</h2>

    <!-- NÚT THÊM XE -->
    <div class="text-end mb-3">

        <a href="/admin/cars/add" class="btn btn-success">
            + Thêm xe
        </a>

    </div>

    <div class="row">

        <div class="col-md-4 mb-4" th:each="car : ${cars}">

            <div class="card shadow">

                <img th:src="${car.image != null ? car.image : 'https://via.placeholder.com/400x220'}"
                     class="card-img-top"
                     style="height:220px;object-fit:cover">

                <div class="card-body">

                    <h5 th:text="${car.name}"></h5>

                    <p>Hãng: <span th:text="${car.brand}"></span></p>

                    <p>Số chỗ: <span th:text="${car.seats}"></span></p>

                    <p>Nhiên liệu: <span th:text="${car.fuelType}"></span></p>

                    <p>Hộp số: <span th:text="${car.transmission}"></span></p>

                    <p class="price">
                        <span th:text="${#numbers.formatDecimal(car.price,0,'COMMA',0,'POINT')}"></span>
                        VND / ngày
                    </p>

                    <!-- NÚT ADMIN -->

                    <a th:href="@{'/admin/cars/edit/' + ${car.id}}"
                       class="btn btn-warning w-100 mb-2">
                        ✏️ Sửa xe
                    </a>

                    <a th:href="@{'/admin/cars/delete/' + ${car.id}}"
                       class="btn btn-danger w-100"
                       onclick="return confirm('Bạn có chắc muốn xóa xe này?')">
                        🗑 Xóa xe
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<footer class="bg-dark text-white text-center p-4 mt-5">
    © 2026 Thuê Xe Tự Lái - ADMIN
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
