<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Sửa xe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>✏ Sửa xe</h2>

    <form method="post" action="/admin/cars/save">

        <input type="hidden" name="id" th:value="${car.id}">

        <div class="mb-3">
            <label>Tên xe</label>
            <input type="text" name="name"
                   th:value="${car.name}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Hãng</label>
            <input type="text" name="brand"
                   th:value="${car.brand}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Số chỗ</label>
            <input type="number" name="seats"
                   th:value="${car.seats}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Giá / ngày</label>
            <input type="number" name="price"
                   th:value="${car.price}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Link ảnh</label>
            <input type="text" name="image"
                   th:value="${car.image}"
                   class="form-control">
        </div>

        <button class="btn btn-primary">
            Cập nhật
        </button>

        <a href="/admin/cars" class="btn btn-secondary">
            Quay lại
        </a>

    </form>

</div>

</body>
</html>
