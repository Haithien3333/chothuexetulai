<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Thêm xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>➕ Thêm xe</h2>

    <form th:action="@{/admin/cars/save}" th:object="${car}" method="post">

        <div class="mb-3">
            <label>Tên xe</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Hãng</label>
            <input type="text" th:field="*{brand}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Số chỗ</label>
            <input type="number" th:field="*{seats}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Giá / ngày</label>
            <input type="number" th:field="*{price}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Loại nhiên liệu</label>
            <select th:field="*{fuelType}" class="form-control">
                <option value="Xăng">Xăng</option>
                <option value="Dầu">Dầu</option>
                <option value="Điện">Điện</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Hộp số</label>
            <select th:field="*{transmission}" class="form-control">
                <option value="Số sàn">Số sàn</option>
                <option value="Tự động">Tự động</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Link ảnh</label>
            <input type="text" th:field="*{image}" class="form-control">
        </div>

        <button class="btn btn-success">Lưu xe</button>
        <a href="/admin/cars" class="btn btn-secondary">Quay lại</a>

    </form>

</div>

</body>
</html>
