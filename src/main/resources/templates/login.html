<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Đăng nhập</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f5f5;
        }

        .login-box{
            max-width:420px;
            margin:auto;
            margin-top:100px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

    </style>

</head>

<body>

<div class="login-box">

    <h3 class="text-center mb-4">🔐 Đăng nhập</h3>


    <!-- THÔNG BÁO LỖI -->

    <div class="alert alert-danger"
         th:if="${error}">

        Email hoặc mật khẩu không đúng

    </div>


    <form method="post" action="/login">

        <div class="mb-3">
            <label>Email</label>
            <input type="email"
                   name="email"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password"
                   name="password"
                   class="form-control"
                   required>
        </div>

        <button class="btn btn-primary w-100">
            Đăng nhập
        </button>

    </form>


    <p class="mt-3 text-center">

        Chưa có tài khoản?

        <a href="/register">
            Đăng ký
        </a>

    </p>

</div>

</body>

</html>
