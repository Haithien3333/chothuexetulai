<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:replace="~{header :: header}"></div>

<head>
    <meta charset="UTF-8">
    <title>Chi tiết xe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .car-box{
            background:white;
            border-radius:10px;
            padding:20px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .car-img{
            width:100%;
            height:300px;
            object-fit:cover;
            border-radius:10px;
        }

        .price{
            color:red;
            font-size:22px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="row car-box">

        <!-- ẢNH -->
        <div class="col-md-6">
            <img th:src="${car.image != null ? car.image : 'https://via.placeholder.com/500x300'}"
                 class="car-img">
        </div>

        <!-- THÔNG TIN -->
        <div class="col-md-6">

            <h3 th:text="${car.name}"></h3>

            <p><b>Hãng:</b> <span th:text="${car.brand}"></span></p>
            <p><b>Số chỗ:</b> <span th:text="${car.seats}"></span></p>
            <p><b>Nhiên liệu:</b> <span th:text="${car.fuelType}"></span></p>
            <p><b>Hộp số:</b> <span th:text="${car.transmission}"></span></p>

            <p class="price">
                <span th:text="${#numbers.formatDecimal(car.price,0,'COMMA',0,'POINT')}"></span>
                VND / ngày
            </p>

            <div th:if="${carUnavailable}" class="alert alert-warning mt-3 mb-0">
                <strong>Xe đang được đặt.</strong> Xe này đã có đơn thuê đang xử lý hoặc đang trong thời gian thuê, tạm thời không hiển thị trên trang chủ và không thể đặt thêm.
            </div>

            <!-- NÚT -->
            <a th:if="${!carUnavailable}"
               th:href="@{'/car/' + ${car.id} + '/hop-dong'}"
               class="btn btn-success w-100 mt-3">
                🚗 Thuê xe ngay
            </a>

            <a href="/" class="btn btn-secondary w-100 mt-2">
                ⬅️ Quay lại
            </a>

        </div>

    </div>

</div>

</body>
</html>
