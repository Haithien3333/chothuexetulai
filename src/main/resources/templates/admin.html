<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 40px;
        }
        .admin-title {
            text-align: center;
            margin-bottom: 40px;
            color: #333;
        }
        .admin-title h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .admin-title p {
            color: #666;
            font-size: 1.1rem;
        }
        .admin-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .menu-item {
            text-decoration: none;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s ease;
            color: white;
            font-weight: 600;
            border: 2px solid transparent;
        }
        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            text-decoration: none;
            color: white;
        }
        .menu-item-bookings {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .menu-item-bookings:hover {
            border-color: #667eea;
        }
        .menu-item-cars {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .menu-item-cars:hover {
            border-color: #f5576c;
        }
        .menu-item-rentals {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        .menu-item-rentals:hover {
            border-color: #00f2fe;
        }
        .menu-icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 10px;
        }
        .menu-label {
            font-size: 1rem;
        }
    </style>
</head>

<body>

<div class="admin-container">
    <div class="admin-title">
        <h1>🔐 Trang Quản Trị</h1>
        <p>Chỉ admin mới vào được</p>
    </div>

    <div class="admin-menu">
        <a href="/admin/bookings" class="menu-item menu-item-bookings">
            <span class="menu-icon">📋</span>
            <span class="menu-label">Quản lý đơn đặt xe</span>
        </a>

        <a href="/admin/cars" class="menu-item menu-item-cars">
            <span class="menu-icon">🚗</span>
            <span class="menu-label">Quản lý xe</span>
        </a>

        <a href="/admin/car-rentals" class="menu-item menu-item-rentals">
            <span class="menu-icon">📊</span>
            <span class="menu-label">Quản lý xe đang thuê</span>
        </a>

        <a href="/" class="menu-item" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); grid-column: 1 / -1;">
            <span class="menu-icon">🏠</span>
            <span class="menu-label">Quay lại trang chủ</span>
        </a>
    </div>
</div>

</body>

</html>
