<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>danh sach xe hiện tại đang nhàn rỗi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .car-card{
            transition:0.3s;
        }

        .car-card:hover{
            transform:scale(1.05);
        }

        .price{
            color:red;
            font-size:18px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div th:replace="header :: header"></div>

<div class="container mt-5">

    <!-- TIÊU ĐỀ + NÚT ADMIN -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>🚗 danh sach xe hiện tại đang nhàn rỗi</h2>

        <!-- ADMIN MENU -->
        <div th:if="${session.user != null and session.user.role?.trim() == 'ADMIN'}" class="btn-group">
            <button type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown">
                ⚙️ Quản lý
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li>
                    <a class="dropdown-item" href="/admin/cars">
                        🚗 Quản lý xe
                    </a>
                </li>
                <li>
                    <a class="dropdown-item" href="/admin/bookings">
                        📋 Quản lý booking
                    </a>
                </li>
                <li>
                    <a class="dropdown-item" href="/admin/car-rentals">
                        📊 Xe đang thuê
                    </a>
                </li>
                <li>
                    <hr class="dropdown-divider">
                </li>
                <li>
                    <a class="dropdown-item btn-success" href="/admin/cars/add">
                        ➕ Thêm xe mới
                    </a>
                </li>
            </ul>
        </div>

    </div>

    <!-- DEBUG (có thể xóa) -->
    <!--
    <p th:text="${session.user}"></p>
    <p th:text="${session.user.role}"></p>
    -->

    <div class="row">

        <div class="col-md-4 mb-4" th:each="car : ${cars}">

            <div class="card shadow car-card">

                <img th:src="${car.image != null ? car.image : 'https://via.placeholder.com/400x220'}"
                     class="card-img-top"
                     style="height:220px;object-fit:cover">

                <div class="card-body">

                    <h5 th:text="${car.name}"></h5>

                    <p>Hãng: <span th:text="${car.brand}"></span></p>

                    <p>Số chỗ: <span th:text="${car.seats}"></span></p>

                    <p>Nhiên liệu: <span th:text="${car.fuelType}"></span></p>

                    <p>Hộp số: <span th:text="${car.transmission}"></span></p>

                    <p class="price">
                        <span th:text="${#numbers.formatDecimal(car.price,0,'COMMA',0,'POINT')}"></span>
                        VND / ngày
                    </p>

                    <!-- CHƯA LOGIN -->
                    <div th:if="${session.user == null}">
                        <a href="/login" class="btn btn-secondary w-100">
                            🔐 Đăng nhập để thuê xe
                          </a>
                    </div>

                    <!-- ADMIN -->
                    <div th:if="${session.user != null and session.user.role?.trim() == 'ADMIN'}">

                        <a th:href="@{'/admin/cars/edit/' + ${car.id}}"
                           class="btn btn-warning w-100 mb-2">
                            ✏️ Sửa
                        </a>

                        <a th:href="@{'/admin/cars/delete/' + ${car.id}}"
                           class="btn btn-danger w-100"
                           onclick="return confirm('Bạn có chắc muốn xóa xe này?')">
                            🗑️ Xóa
                        </a>

                    </div>

                    <!-- XEM CHI TIẾT -->
                    <a th:href="@{'/car/' + ${car.id}}"
                       class="btn btn-primary w-100 mt-2">
                        🔍 Xem chi tiết
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<footer class="bg-dark text-white text-center p-4 mt-5">
    © 2026 Thuê Xe Tự Lái
    <br>
    Hotline: 0900 000 000
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
