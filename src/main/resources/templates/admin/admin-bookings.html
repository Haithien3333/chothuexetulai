<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản lý booking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <h3 class="mb-0">📋 Danh sách đơn thuê xe</h3>
        <a href="/" class="btn btn-outline-secondary">
            ⬅️ Quay về trang chủ
        </a>
    </div>

    <table class="table mt-3">

        <tr>
            <th>ID</th>
            <th>User</th>
            <th>Car</th>
            <th>Ngày</th>
            <th>Trạng thái</th>
            <th>Hành động</th>
        </tr>

        <tr th:each="b : ${bookings}">

            <td th:text="${b.id}"></td>

            <td th:text="${b.userId}"></td>

            <td th:text="${b.carId}"></td>

            <td>
                <span th:text="${b.startDate}"></span> -
                <span th:text="${b.endDate}"></span>
            </td>

            <td>
                <th:block th:switch="${b.status}">
                    <span th:case="'PENDING'">Chờ duyệt</span>
                    <span th:case="'APPROVED'">Đã duyệt</span>
                    <span th:case="'REJECTED'">Đã từ chối</span>
                    <span th:case="'PAID'">Đã thanh toán</span>
                    <span th:case="*" th:text="${b.status}">—</span>
                </th:block>
            </td>

            <td>

                <a th:href="@{'/admin/bookings/approve/' + ${b.id}}"
                   class="btn btn-success btn-sm">
                    ✔ Duyệt
                </a>

                <a th:href="@{'/admin/bookings/reject/' + ${b.id}}"
                   class="btn btn-danger btn-sm">
                    ❌ Từ chối
                </a>

            </td>

        </tr>

    </table>

</div>

</body>
</html>
