<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản lý booking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }

        .table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .table th {
            background: #343a40;
            color: white;
            text-align: center;
        }

        .table td {
            text-align: center;
            vertical-align: middle;
        }

        .car-img {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            margin: 2px;
            cursor: pointer;
        }

        .note-text {
            max-width: 150px;
            font-size: 13px;
        }

        .status {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
        }

        .status-completed { background: #d4edda; color: #155724; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-rejected { background: #f8d7da; color: #721c24; }
        .status-approved { background: #cce5ff; color: #004085; }
        .status-paid { background: #e2e3e5; color: #383d41; }

        .btn-group-custom {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .table tbody tr:hover {
            background: #f1f1f1;
        }
    </style>

</head>

<body>

<div class="container mt-5">

    <h3>📋 Danh sách đơn thuê xe</h3>

    <table class="table mt-3">

        <tr>
            <th>ID</th>
            <th>User</th>
            <th>Car</th>
            <th>Ngày</th>
            <th>Trạng thái</th>
            <th>Ảnh trả xe</th>
            <th>Ghi chú</th>
            <th>Đền bù</th>

            <!-- 🔥 BƯỚC 2: THÊM CỘT THANH TOÁN -->
            <th>Thanh toán</th>

            <th>Hành động</th>
        </tr>

        <tr th:each="b : ${bookings}">

            <td th:text="${b.id}"></td>
            <td th:text="${b.userId}"></td>
            <td th:text="${b.carId}"></td>

            <td>
                <span th:text="${b.startDate}"></span> -
                <span th:text="${b.endDate}"></span>
            </td>

            <!-- STATUS -->
            <td>
                <span th:class="'status ' +
                    (${b.status} == 'COMPLETED' ? 'status-completed' :
                    (${b.status} == 'PENDING' ? 'status-pending' :
                    (${b.status} == 'REJECTED' ? 'status-rejected' :
                    (${b.status} == 'APPROVED' ? 'status-approved' :
                    'status-paid'))))">
                    <span th:text="${b.status}"></span>
                </span>
            </td>

            <!-- ẢNH -->
            <td>
                <div th:if="${b.returnImage != null}">
                    <img th:each="img : ${#strings.arraySplit(b.returnImage, ';')}"
                         th:src="@{'/uploads/' + ${img}}"
                         class="car-img"
                         onclick="window.open(this.src)">
                </div>
            </td>

            <!-- NOTE -->
            <td class="note-text" th:text="${b.returnNote}"></td>

            <!-- ĐỀN BÙ -->
            <td>
                <span th:if="${b.damageStatus == 'OK'}" class="text-success">
                    ✔ OK
                </span>

                <span th:if="${b.damageStatus == 'DAMAGED'}" class="text-danger">
                    ❌ Trầy <br>
                    <b th:text="${b.damageFee}"></b> VND
                </span>
            </td>

            <!-- 🔥 BƯỚC 2: HIỂN THỊ THANH TOÁN -->
            <td>
                <span th:if="${b.damagePaid == true}" class="text-success">
                    ✔ Đã thanh toán
                </span>

                <span th:if="${b.damagePaid == false || b.damagePaid == null}" class="text-danger">
                    ❌ Chưa thanh toán
                </span>
            </td>

            <!-- ACTION -->
            <td>
                <div class="btn-group-custom">

                    <a th:href="@{'/admin/bookings/approve/' + ${b.id}}"
                       class="btn btn-success btn-sm">
                        ✔ Duyệt
                    </a>

                    <a th:href="@{'/admin/bookings/reject/' + ${b.id}}"
                       class="btn btn-danger btn-sm">
                        ❌ Từ chối
                    </a>

                    <a th:href="@{'/admin/check-ok/' + ${b.id}}"
                       class="btn btn-primary btn-sm">
                        ✔ Xe OK
                    </a>

                    <a th:href="@{'/admin/check-damage/' + ${b.id}}"
                       class="btn btn-warning btn-sm">
                        ⚠ Xe trầy
                    </a>

                </div>
            </td>

        </tr>

    </table>

</div>

<!-- 🔥 BƯỚC 3: AUTO REFRESH ADMIN -->
<script>
    setInterval(() => {
        location.reload();
    }, 5000); // 5 giây reload
</script>

</body>
</html>
