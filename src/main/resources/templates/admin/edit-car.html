<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Sửa xe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>✏ Sửa xe</h2>

    <form method="post" th:action="@{/admin/cars/save}" th:object="${car}">

        <input type="hidden" th:field="*{id}">

        <!-- TÊN XE -->
        <div class="mb-3">
            <label>Tên xe</label>
            <input type="text" th:field="*{name}" class="form-control">
        </div>

        <!-- HÃNG -->
        <div class="mb-3">
            <label>Hãng</label>
            <input type="text" th:field="*{brand}" class="form-control">
        </div>

        <!-- SỐ CHỖ -->
        <div class="mb-3">
            <label>Số chỗ</label>
            <input type="number" th:field="*{seats}" class="form-control">
        </div>

        <!-- GIÁ -->
        <div class="mb-3">
            <label>Giá / ngày</label>
            <input type="number" th:field="*{price}" class="form-control">
        </div>

        <!-- NHIÊN LIỆU -->
        <div class="mb-3">
            <label>Nhiên liệu</label>
            <select th:field="*{fuelType}" class="form-select">
                <option value="Xăng">Xăng</option>
                <option value="Diesel">Diesel</option>
                <option value="Điện">Điện</option>
            </select>
        </div>

        <!-- HỘP SỐ -->
        <div class="mb-3">
            <label>Hộp số</label>
            <select th:field="*{transmission}" class="form-select">
                <option value="Tự động">🚗 Tự động</option>
                <option value="Số sàn">⚙️ Số sàn</option>
            </select>
        </div>

        <!-- ẢNH -->
        <div class="mb-3">
            <label>Link ảnh</label>
            <input type="text" th:field="*{image}" class="form-control">
        </div>

        <button class="btn btn-primary">Cập nhật</button>

        <a href="/admin/cars" class="btn btn-secondary">Quay lại</a>

    </form>

</div>

</body>
</html>
