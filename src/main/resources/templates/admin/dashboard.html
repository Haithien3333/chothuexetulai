<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard Admin</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        .container {
            width: 90%;
            margin: 30px auto;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        /* CARD */
        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            flex: 1;
            padding: 25px;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .revenue {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
        }

        .booking {
            background: linear-gradient(45deg, #f7971e, #ffd200);
        }

        .card b {
            font-size: 24px;
        }

        /* CHART BOX */
        .chart-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="container">

    <h2>📊 Dashboard Admin</h2>

    <!-- CARDS -->
    <div class="cards">
        <div class="card revenue">
            💰 Tổng doanh thu<br>
            <b th:text="${totalRevenue} + ' VNĐ'"></b>
        </div>

        <div class="card booking">
            📦 Đơn hoàn thành<br>
            <b th:text="${totalBookings}"></b>
        </div>
    </div>

    <!-- CHART -->
    <div class="chart-box">
        <canvas id="revenueChart"></canvas>
    </div>

    <div class="chart-box" style="margin-top:30px;">
        <h3>🚗 Top xe kiếm tiền nhiều nhất</h3>
        <canvas id="topCarsChart"></canvas>
    </div>


</div>

<!-- SCRIPT CHART -->
<script th:inline="javascript">
    /* Lấy dữ liệu từ backend */
    let dataMap = /*[[${revenueByDate}]]*/ {};

    let labels = Object.keys(dataMap);
    let data = Object.values(dataMap);

    const ctx = document.getElementById('revenueChart');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Doanh thu (VNĐ)',
                data: data,
                fill: true,
                tension: 0.4,
                borderWidth: 3
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: true
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>

<script th:inline="javascript">
    let topCars = /*[[${topCars}]]*/ {};

    let carLabels = Object.keys(topCars);
    let carData = Object.values(topCars);

    new Chart(document.getElementById('topCarsChart'), {
        type: 'bar',
        data: {
            labels: carLabels,
            datasets: [{
                label: 'Doanh thu theo xe',
                data: carData,
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            indexAxis: 'y',
            plugins: {
                legend: {
                    display: true
                }
            }
        }
    });
</script>

</body>
</html>
