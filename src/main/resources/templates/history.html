<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lịch sử thuê xe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .car-mini {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            max-width: 360px;
        }

        .car-mini img {
            width: 96px;
            height: 64px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .car-mini .meta {
            font-size: 0.8rem;
            color: #666;
        }

        .car-mini .title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 2px;
        }

        @media (max-width: 768px) {
            .car-mini {
                flex-direction: column;
            }
            .car-mini img {
                width: 100%;
                height: 120px;
            }
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="box">

        <h3>📋 Lịch sử thuê xe</h3>

        <div class="table-responsive mt-3">
            <table class="table align-middle">

                <tr>
                    <th>ID</th>
                    <th>Xe</th>
                    <th>Ngày</th>
                    <th>Trạng thái</th>
                    <th>Cọc</th>
                    <th>Thanh toán khi nhận xe</th>
                </tr>

                <tr th:each="row : ${rows}" th:with="b=${row.booking}, c=${row.car}">

                    <td th:text="${b.id}"></td>

                    <td>
                        <div th:if="${c != null}" class="car-mini">
                            <img th:src="${c.image != null ? c.image : 'https://via.placeholder.com/96x64'}"
                                 th:alt="${c.name}">
                            <div>
                                <div class="title" th:text="${c.name}">—</div>
                                <div class="meta">
                                    <span th:text="${c.brand}">—</span>
                                    · <span th:text="${c.seats}">—</span> chỗ
                                    · <span th:text="${c.fuelType ?: '—'}">—</span>
                                    · <span th:text="${c.transmission}">—</span>
                                </div>
                                <div class="meta mt-1">
                                    <span class="text-danger fw-semibold"
                                          th:text="${#numbers.formatDecimal(c.price,0,'COMMA',0,'POINT')}">0</span>
                                    VND/ngày
                                </div>
                                <a th:href="@{'/car/' + ${c.id}}" class="btn btn-link btn-sm p-0 mt-1">Xem chi tiết xe →</a>
                            </div>
                        </div>
                        <div th:if="${c == null}" class="text-muted small">
                            Xe mã <strong th:text="${b.carId}">—</strong>
                            <span class="d-block">(Không còn trong hệ thống)</span>
                        </div>
                    </td>

                    <td>
                        <span th:text="${b.startDate}"></span>
                        –
                        <span th:text="${b.endDate}"></span>
                    </td>

                    <td>
                        <th:block th:switch="${b.status}">
                            <span th:case="'PENDING'">Chờ duyệt</span>
                            <span th:case="'APPROVED'">Đã duyệt</span>
                            <span th:case="'REJECTED'">Đã từ chối</span>
                            <span th:case="'PAID'">Đã thanh toán</span>
                            <span th:case="'COMPLETED'">Đã hoàn thành</span>
                            <span th:case="*" th:text="${b.status}">—</span>
                        </th:block>
                    </td>

                    <td class="small">
                        <span th:if="${b.depositPercent != null}">
                            <span th:text="${b.depositPercent}">—</span>% ·
                            <span th:text="${b.depositMethod}">—</span>
                        </span>
                        <span th:if="${b.depositPercent == null}">—</span>
                    </td>

                    <td>
                        <a th:if="${b.status == 'APPROVED'}"
                           th:href="@{'/payment/' + ${b.id}}"
                           class="btn btn-primary btn-sm">
                            💳 Thanh toán còn lại
                        </a>
                        <a th:if="${b.status == 'PAID'}"
                           th:href="@{'/complete-booking/' + ${b.id}}"
                           class="btn btn-success btn-sm"
                           onclick="return confirm('Xác nhận hoàn thành thuê xe?');">
                            ✅ Hoàn thành
                        </a>
                    </td>

                </tr>

            </table>
        </div>

        <a href="/" class="btn btn-secondary mt-2">
            ⬅️ Quay lại
        </a>

    </div>

</div>

</body>
</html>
