<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lịch sử thuê xe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .car-mini {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            max-width: 360px;
        }

        .car-mini img {
            width: 96px;
            height: 64px;
            object-fit: cover;
            border-radius: 8px;
        }

        .return-form {
            border: 1px dashed #ccc;
            padding: 8px;
            border-radius: 8px;
            background: #fff8e1;
        }

        .damage-box {
            font-size: 13px;
            margin-top: 5px;
        }

        .damage-ok {
            color: green;
            font-weight: bold;
        }

        .damage-bad {
            color: red;
            font-weight: bold;
        }

        .damage-box {
            font-size: 13px;
        }

        .damage-box .btn {
            width: 100%;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="box">

        <h3>📋 Lịch sử thuê xe</h3>

        <div class="table-responsive mt-3">
            <table class="table align-middle">

                <tr>
                    <th>ID</th>
                    <th>Xe</th>
                    <th>Ngày</th>
                    <th>Trạng thái</th>
                    <th>Cọc</th>
                    <th>Thanh toán</th>
                    <th>Đền bù</th> <!-- 🔥 THÊM -->
                </tr>

                <tr th:each="row : ${rows}" th:with="b=${row.booking}, c=${row.car}">

                    <td th:text="${b.id}"></td>

                    <td>
                        <div th:if="${c != null}" class="car-mini">
                            <img th:src="${c.image != null ? c.image : 'https://via.placeholder.com/96x64'}">
                            <div>
                                <b th:text="${c.name}"></b><br>
                                <small th:text="${c.brand}"></small>
                            </div>
                        </div>
                    </td>

                    <td>
                        <span th:text="${b.startDate}"></span> -
                        <span th:text="${b.endDate}"></span>
                    </td>

                    <td th:text="${b.status}"></td>

                    <td th:text="${b.depositPercent}"></td>

                    <!-- ACTION -->
                    <td>

                        <a th:if="${b.status == 'APPROVED'}"
                           th:href="@{'/payment/' + ${b.id}}"
                           class="btn btn-primary btn-sm">
                            💳 Thanh toán
                        </a>

                        <a th:if="${b.status == 'PAID'}"
                           th:href="@{'/complete-booking/' + ${b.id}}"
                           class="btn btn-success btn-sm">
                            ✅ Hoàn thành
                        </a>

                        <form th:if="${b.status == 'COMPLETED'}"
                              th:action="@{/return-car/{id}(id=${b.id})}"
                              method="post"
                              enctype="multipart/form-data"
                              class="return-form mt-2">

                            <input type="file" name="image" multiple class="form-control">

                            <textarea name="note"
                                      placeholder="Mô tả tình trạng xe..."
                                      class="form-control mb-1"></textarea>

                            <button type="submit" class="btn btn-warning btn-sm w-100">
                                📸 Gửi tình trạng xe
                            </button>

                        </form>

                    </td>

                    <!-- 🔥 PHẦN ĐỀN BÙ -->
                    <td class="damage-box">

                        <!-- chưa kiểm tra -->
                        <span th:if="${b.damageStatus == null}" class="text-muted">
        ⏳ Chưa kiểm tra
    </span>

                        <!-- OK -->
                        <span th:if="${b.damageStatus == 'OK'}" class="text-success">
        ✔ Không hư
    </span>

                        <!-- BỊ TRẦY -->
                        <div th:if="${b.damageStatus == 'DAMAGED'}">

                            <!-- CHƯA THANH TOÁN -->
                            <div th:if="${b.damagePaid == false || b.damagePaid == null}">

        <span class="text-danger">
            ❌ Bị trầy <br>
            Đền: <b th:text="${b.damageFee}"></b> VND
        </span>

                                <!-- QR -->
                                <div class="mt-2 text-center">
                                    <img src="/images/MaQR.jpg" width="150">
                                    <div style="font-size:12px">
                                        Nội dung: DEN_BU_<span th:text="${b.id}"></span>
                                    </div>
                                </div>

                                <!-- NÚT -->
                                <a th:href="@{'/confirm-paid/' + ${b.id}}"
                                   class="btn btn-success btn-sm mt-2">
                                    ✔ Tôi đã chuyển khoản
                                </a>

                            </div>

                            <!-- ĐÃ THANH TOÁN -->
                            <div th:if="${b.damagePaid == true}">
        <span class="text-success">
            ✔ Đã thanh toán
        </span>
                            </div>

                        </div>

                    </td>

                </tr>

            </table>
        </div>

        <a href="/" class="btn btn-secondary mt-2">
            ⬅️ Quay lại
        </a>

    </div>

</div>

</body>
</html>
